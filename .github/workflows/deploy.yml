# =============================================================================
# GitHub Actions: Build and Deploy Hugo Site to GitHub Pages
#
# Triggers on every push to the `main` branch.
# Uses the official Hugo and GitHub Pages actions.
# =============================================================================

name: Deploy Hugo site to Pages

on:
  # Run on pushes to main branch
  push:
    branches: ["main"]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time (cancel in-progress if a new push arrives)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -- Build Job --
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.3
    steps:
      # Install Hugo Extended
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # Check out the repo (with submodules so PaperMod theme is included)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive    # Pulls in the PaperMod theme submodule
          fetch-depth: 0           # Full history (needed for .GitInfo and .Lastmod)

      # Configure GitHub Pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build the site
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify

      # Upload the built site as an artifact for the deploy job
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # -- Deploy Job --
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
